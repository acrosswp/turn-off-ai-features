<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background -->
  <rect width="256" height="256" rx="36" fill="#0d1b3e"/>

  <!-- WordPress W in a circle -->
  <circle cx="80" cy="100" r="52" fill="none" stroke="#ffffff" stroke-width="6"/>
  <text x="80" y="118" font-family="Georgia, serif" font-weight="700"
        font-size="58" fill="#ffffff" text-anchor="middle">W</text>

  <!-- AI text -->
  <text x="178" y="118" font-family="Arial Black, Arial" font-weight="900"
        font-size="56" fill="#ffffff" text-anchor="middle">AI</text>

  <!-- Red OFF toggle -->
  <rect x="60" y="172" width="136" height="52" rx="26" fill="#cc1100"/>
  <circle cx="87" cy="198" r="20" fill="#ffffff"/>
  <text x="163" y="206" font-family="Arial" font-weight="800" font-size="22"
        fill="#ffffff" text-anchor="middle">OFF</text>
</svg>
